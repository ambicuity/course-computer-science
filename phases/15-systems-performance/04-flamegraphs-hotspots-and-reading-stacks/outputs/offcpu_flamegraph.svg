  <rect x="140.00" y="79" width="200.00" height="18" fill="#4466146" name="main;io;read_block;epoll_wait" samples="200" pct="20.0" onmouseover="details(evt)"/>
  <text x="142" y="92">epoll_wait</text>
  <rect x="340.00" y="79" width="450.00" height="18" fill="#4466130" name="main;io;read_block;futex_wait" samples="450" pct="45.0" onmouseover="details(evt)"/>
