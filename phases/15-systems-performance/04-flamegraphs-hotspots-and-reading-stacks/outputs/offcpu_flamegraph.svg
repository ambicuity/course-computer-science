  <rect x="940.00" y="79" width="60.00" height="18" fill="#4466157" name="main;parse;tokenize;cond_wait" samples="60" pct="6.0" onmouseover="details(evt)"/>
  <text x="942" y="92">cond_..</text>
</svg>
